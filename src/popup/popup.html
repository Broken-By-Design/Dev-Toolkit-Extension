<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>KAC Toolkit Settings</title>
        <style>
            body {
                width: 220px;
                margin: 0;
                padding: 20px;
                font-family: "Inter", system-ui, sans-serif;
                background: #050505;
                color: #fff;
                -webkit-font-smoothing: antialiased;
            }
            .option {
                display: flex;
                align-items: center;
                cursor: pointer;
                font-size: 0.85rem;
                font-weight: 600;
                margin-bottom: 14px;
                color: #ccc;
                transition: color 0.2s;
            }
            .option:hover {
                color: #fff;
            }
            input[type="checkbox"] {
                margin: 0 10px 0 0;
                width: 16px;
                height: 16px;
                accent-color: #e50914; /* Uses your primary red */
                cursor: pointer;
            }
            hr {
                border: none;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                margin: 18px 0;
            }
            .btn {
                display: block;
                background: #121212;
                color: #fff;
                border: 1px solid rgba(255, 255, 255, 0.08);
                padding: 10px;
                border-radius: 6px;
                cursor: pointer;
                width: 100%;
                font-size: 0.85rem;
                font-weight: 600;
                text-align: center;
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .btn:hover {
                background: #1a1a1a;
                border-color: rgba(255, 255, 255, 0.2);
                transform: translateY(-2px);
            }
        </style>
    </head>
    <body>
        <h1>KAC Toolkit</h1>
        <label class="option">
            <input type="checkbox" id="interceptCryptoCheck" />
            Enable Stream & Crypto Interceptor
        </label>

        <!--<label class="option">
            <input type="checkbox" id="autoCopyCheck" />
            Auto-copy to clipboard
        </label>-->

        <label class="option">
            <input type="checkbox" id="onlyCopyCheck" checked />
            Only copy (No popup)
        </label>

        <hr />

        <button class="btn" id="openSettings">Open Settings</button>

        <script type="module" src="./popup.js"></script>
    </body>
</html>
